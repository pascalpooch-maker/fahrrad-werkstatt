<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fahrrad Werkstatt 8B.1</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>🚲 Fahrrad Werkstatt</h1>
<p>Aufträge · Bilder · Lager · Bestellungen · Kalender · Rechnungen</p>
</header>

<div class="container">

<nav class="tabbar">
<button onclick="zeigeTab('dashboard')">Dashboard</button>
<button onclick="zeigeTab('auftrag')">Auftrag</button>
<button onclick="zeigeTab('liste')">Aufträge</button>
<button onclick="zeigeTab('lager')">Lager</button>
<button onclick="zeigeTab('bestellungen')">Bestellungen</button>
<button onclick="zeigeTab('kalender')">Kalender</button>
<button onclick="zeigeTab('backup')">Backup</button>
</nav>

<section id="dashboard" class="tab card">
<h2>Dashboard</h2>
<div id="dashboardInhalt"></div>
</section>

<section id="auftrag" class="tab card">
<h2 id="formularTitel">Neuer Auftrag</h2>

<input type="hidden" id="editId">

<label>Kunde</label>
<input id="kunde" type="text">

<label>Telefon</label>
<input id="telefon" type="text">

<label>Fahrrad</label>
<input id="fahrrad" type="text">

<label>Leistung</label>
<select id="leistung">
<option value="Frühjahrs-Check|55">Frühjahrs-Check – 55 €</option>
<option value="Reifenwechsel|20">Reifenwechsel – 20 €</option>
<option value="Schlauch wechseln|15">Schlauch wechseln – 15 €</option>
<option value="Bremsen einstellen|15">Bremsen einstellen – 15 €</option>
<option value="Schaltung einstellen|20">Schaltung einstellen – 20 €</option>
<option value="Kette wechseln|25">Kette wechseln – 25 €</option>
<option value="Große Inspektion|129">Große Inspektion – 129 €</option>
</select>

<label>Zusatzarbeiten</label>
<textarea id="notiz" placeholder="z.B. Bremsbeläge hinten prüfen"></textarea>

<label>Material / Teile</label>
<input id="material" placeholder="z.B. Schlauch SV19">

<label>Materialpreis VK €</label>
<input id="materialpreis" type="number" step="0.01">

<label>Status</label>
<select id="status">
<option>Offen</option>
<option>Warten auf Teile</option>
<option>In Arbeit</option>
<option>Fertig</option>
<option>Bezahlt</option>
</select>

<label>Bilder zum Auftrag</label>
<input id="bilder" type="file" accept="image/*" multiple>

<button onclick="auftragSpeichern()">Auftrag speichern</button>
<button onclick="formularLeeren()">Neuer leerer Auftrag</button>
</section>

<section id="liste" class="tab card">
<h2>Aufträge</h2>
<input id="suche" placeholder="Suche nach Kunde, Fahrrad, Status..." oninput="auftraegeAnzeigen()">
<div id="auftragsliste"></div>
</section>

<section id="lager" class="tab card">
<h2>Lager</h2>

<label>Artikel</label>
<input id="lagerName">

<label>Bestand</label>
<input id="lagerBestand" type="number">

<label>EK €</label>
<input id="lagerEk" type="number" step="0.01">

<label>Aufschlag %</label>
<input id="lagerAufschlag" type="number" value="50">

<button onclick="lagerSpeichern()">Teil ins Lager speichern</button>

<div id="lagerListe"></div>
</section>

<section id="bestellungen" class="tab card">
<h2>Bestellungen</h2>

<label>Kunde</label>
<input id="bestellKunde">

<label>Teil</label>
<input id="bestellTeil">

<label>Status</label>
<select id="bestellStatus">
<option>Offen</option>
<option>Bestellt</option>
<option>Geliefert</option>
<option>Eingebaut</option>
</select>

<button onclick="bestellungSpeichern()">Bestellung speichern</button>

<div id="bestellListe"></div>
</section>

<section id="kalender" class="tab card">
<h2>Kalender</h2>

<label>Datum</label>
<input id="terminDatum" type="date">

<label>Uhrzeit</label>
<input id="terminZeit" type="time">

<label>Kunde / Aufgabe</label>
<input id="terminText">

<button onclick="terminSpeichern()">Termin speichern</button>

<div id="terminListe"></div>
</section>

<section id="rechnung" class="tab card">
<h2>Rechnung</h2>
<div id="rechnungInhalt"></div>
<button onclick="zeigeTab('liste')">Zurück</button>
<button onclick="window.print()">Drucken / PDF speichern</button>
</section>

<section id="backup" class="tab card">
<h2>Backup</h2>
<button onclick="backupExport()">Backup exportieren</button>
<textarea id="backupText" placeholder="Backup hier einfügen"></textarea>
<button onclick="backupImport()">Backup importieren</button>
</section>

</div>

<script src="app.js"></script>

</body>
</html>
