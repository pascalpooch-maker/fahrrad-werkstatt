<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Fahrrad Werkstatt Pro V8</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root{--bg:#f5f7fb;--card:#fff;--text:#111827;--muted:#6b7280;--line:#e5e7eb;--pri:#2563eb;--ok:#16a34a;--warn:#d97706;--bad:#dc2626;--dark:#0f172a}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}header{position:sticky;top:0;z-index:5;background:linear-gradient(135deg,#111827,#1d4ed8);color:#fff;padding:14px 14px 10px;box-shadow:0 4px 16px #0002}header h1{margin:0;font-size:22px}.topbar{display:flex;gap:8px;align-items:center;justify-content:space-between;flex-wrap:wrap}.nav{display:flex;gap:7px;overflow:auto;padding-top:10px}.nav button{white-space:nowrap;border:1px solid #ffffff55;background:#ffffff18;color:#fff;border-radius:999px;padding:9px 12px}.nav button.active{background:#fff;color:#111827}main{max-width:1200px;margin:auto;padding:14px}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:12px}.col-3{grid-column:span 3}.col-4{grid-column:span 4}.col-6{grid-column:span 6}.col-8{grid-column:span 8}.col-12{grid-column:span 12}@media(max-width:850px){.col-3,.col-4,.col-6,.col-8{grid-column:span 12}}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:0 2px 10px #0000000b;margin-bottom:12px}.card h2,.card h3{margin:0 0 10px}label{font-size:12px;color:var(--muted);display:block;margin-top:8px}input,textarea,select{width:100%;border:1px solid #d1d5db;border-radius:12px;padding:11px;font-size:15px;background:#fff}textarea{min-height:82px}button{border:0;background:var(--pri);color:#fff;border-radius:12px;padding:10px 12px;font-weight:700;cursor:pointer}button.secondary{background:#e5e7eb;color:#111827}button.ok{background:var(--ok)}button.warn{background:var(--warn)}button.bad{background:var(--bad)}button.small{padding:7px 9px;font-size:12px}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.pill{display:inline-block;border-radius:999px;padding:4px 8px;font-size:12px;background:#eef2ff;color:#1e40af;margin:2px}.muted{color:var(--muted);font-size:13px}.big{font-size:26px;font-weight:800}.list{display:grid;gap:9px}.item{border:1px solid var(--line);border-radius:14px;padding:11px;background:#fff}.item:hover{border-color:#93c5fd}.right{margin-left:auto}.hidden{display:none!important}.tabscreen{display:none}.tabscreen.active{display:block}table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden}th,td{border-bottom:1px solid var(--line);padding:9px;text-align:left;font-size:14px}th{background:#f3f4f6}.money{font-variant-numeric:tabular-nums;font-weight:700}.status-Neu{background:#dbeafe;color:#1d4ed8}.status-Teile{background:#fef3c7;color:#92400e}.status-Arbeit{background:#ede9fe;color:#6d28d9}.status-Fertig{background:#dcfce7;color:#166534}.status-Bezahlt{background:#e5e7eb;color:#111827}.thumb{height:72px;width:72px;object-fit:cover;border-radius:12px;border:1px solid var(--line);margin:4px}.invoice{max-width:860px;background:white;margin:auto;padding:28px;color:#111}.invoice h1{font-size:28px}.qr{width:128px;height:128px;border:1px solid #ddd}.notice{padding:10px;border-radius:12px;background:#ecfeff;border:1px solid #a5f3fc}.danger{background:#fef2f2;border-color:#fecaca}.okbox{background:#f0fdf4;border-color:#bbf7d0}.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}@media(max-width:900px){.kanban{grid-template-columns:1fr}}.drop{border:2px dashed #93c5fd;border-radius:14px;padding:16px;text-align:center;background:#eff6ff}
@media print{header,.noPrint,.nav,button{display:none!important}body{background:#fff}main{padding:0}.card{box-shadow:none;border:0}.invoice{padding:0}.tabscreen{display:block}.noInvoice{display:none!important}}
</style>
</head>
<body>
<header><div class="topbar"><h1>🚲 Fahrrad Werkstatt Pro V8</h1><div id="todayMini"></div></div><div class="nav" id="nav"></div></header>
<main>
<section id="dashboard" class="tabscreen active"></section>
<section id="auftraege" class="tabscreen"></section>
<section id="termine" class="tabscreen"></section>
<section id="kunden" class="tabscreen"></section>
<section id="lager" class="tabscreen"></section>
<section id="bestellungen" class="tabscreen"></section>
<section id="einkauf" class="tabscreen"></section>
<section id="leistungen" class="tabscreen"></section>
<section id="statistik" class="tabscreen"></section>
<section id="backup" class="tabscreen"></section>
<section id="rechnung" class="tabscreen"></section>
</main>
<script>
const APP_URL='https://pascalpooch-maker.github.io/fahrrad-werkstatt/';
const tabs=[['dashboard','Heute'],['auftraege','Aufträge'],['termine','Kalender'],['kunden','Kunden'],['lager','Lager'],['bestellungen','Bestellungen'],['einkauf','EK-Rechnungen'],['leistungen','Leistungen'],['statistik','Statistik'],['backup','Backup']];
const €=n=>(Number(n)||0).toFixed(2).replace('.',',')+' €';
const uid=(p='ID')=>p+'-'+new Date().toISOString().slice(0,10).replaceAll('-','')+'-'+Math.random().toString(36).slice(2,6).toUpperCase();
const today=()=>new Date().toISOString().slice(0,10);const esc=s=>String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
const defaultState={settings:{hourly:45,vat:false,markup:40,logo:'',name:'Meine Fahrradwerkstatt',iban:'',phone:'',address:'',invoiceNote:'Vielen Dank für deinen Auftrag.'},orders:[],appointments:[],inventory:[{id:uid('T'),name:'Schlauch SV/AV Standard',cat:'Schläuche',stock:8,min:3,ek:3.5,vk:7},{id:uid('T'),name:'Bremsbeläge Shimano B05S',cat:'Bremsen',stock:4,min:2,ek:5.8,vk:10},{id:uid('T'),name:'Kette 8/9/10-fach',cat:'Antrieb',stock:3,min:2,ek:15,vk:25}],services:[{id:uid('L'),name:'Frühjahrs-Check',cat:'Wartung',price:55,minutes:60,desc:'Putzen, einstellen, Durchsicht, Reifendruck, Schraubenkontrolle',parts:[]},{id:uid('L'),name:'Reifenwechsel',cat:'Reparatur',price:20,minutes:25,desc:'Reifen demontieren/montieren, Druck prüfen',parts:[]},{id:uid('L'),name:'Schlauch wechseln',cat:'Reparatur',price:15,minutes:20,desc:'Rad ausbauen, Schlauch wechseln, Mantel prüfen',parts:[]},{id:uid('L'),name:'Schaltung einstellen',cat:'Reparatur',price:20,minutes:25,desc:'Umwerfer/Schaltwerk einstellen',parts:[]},{id:uid('L'),name:'Bremsen einstellen',cat:'Reparatur',price:15,minutes:20,desc:'Beläge, Zug, Hebelweg und Bremspunkt prüfen',parts:[]},{id:uid('L'),name:'Kette wechseln',cat:'Antrieb',price:25,minutes:25,desc:'Kette messen/wechseln, Antrieb prüfen',parts:[]},{id:uid('L'),name:'Kleine Inspektion',cat:'Wartung',price:79,minutes:90,desc:'Komplettkontrolle, Bremsen/Schaltung einstellen, Kette/Reifen prüfen',parts:[]},{id:uid('L'),name:'Große Inspektion',cat:'Wartung',price:129,minutes:150,desc:'Großer Service inkl. Lager/Laufräder/Antrieb/Bremsen',parts:[]}],purchaseInvoices:[],suppliers:['Bike-Discount','Hartje','Paul Lange','Messingschlager','Shimano'],purchaseQueue:[]};
let S=load(), editing=null, selectedInvoice=null;
function load(){try{return {...defaultState,...JSON.parse(localStorage.getItem('fw_v8')||'{}')}}catch(e){return structuredClone(defaultState)}}
function save(){localStorage.setItem('fw_v8',JSON.stringify(S));renderAll()}
function nav(){document.getElementById('nav').innerHTML=tabs.map(t=>`<button onclick="show('${t[0]}')" id="nav_${t[0]}">${t[1]}</button>`).join('')}
function show(id){document.querySelectorAll('.tabscreen').forEach(x=>x.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'));let b=document.getElementById('nav_'+id); if(b)b.classList.add('active'); if(id=='rechnung')document.getElementById('nav_dashboard').classList.remove('active')}
function renderAll(){document.getElementById('todayMini').innerHTML=new Date().toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'2-digit'});renderDashboard();renderOrders();renderAppointments();renderCustomers();renderInventory();renderPurchases();renderServices();renderStats();renderBackup();renderOrdersSelects()}
function sumOrder(o){let s=o.services.reduce((a,x)=>a+Number(x.price||0),0)+o.materials.reduce((a,x)=>a+Number(x.vk||0)*Number(x.qty||1),0);let ek=o.materials.reduce((a,x)=>a+Number(x.ek||0)*Number(x.qty||1),0);return {total:s,ek,profit:s-ek}}
function renderDashboard(){let due=S.appointments.filter(a=>a.date==today());let open=S.orders.filter(o=>!['Bezahlt','Fertig'].includes(o.status));let warn=S.inventory.filter(i=>Number(i.stock)<=Number(i.min));document.getElementById('dashboard').innerHTML=`<div class="grid"><div class="card col-3"><div class="muted">Offene Aufträge</div><div class="big">${open.length}</div></div><div class="card col-3"><div class="muted">Termine heute</div><div class="big">${due.length}</div></div><div class="card col-3"><div class="muted">Lagerwarnungen</div><div class="big">${warn.length}</div></div><div class="card col-3"><div class="muted">Umsatz Monat</div><div class="big">${€(monthRevenue())}</div></div></div><div class="card"><h2>Heute</h2>${due.map(a=>`<div class="item"><b>${esc(a.time)} ${esc(a.customer)}</b><br>${esc(a.title)} <span class="muted">${esc(a.note||'')}</span><div class="row"><button class="small" onclick="appointmentToOrder('${a.id}')">in Auftrag umwandeln</button><button class="small secondary" onclick="show('termine')">Kalender</button></div></div>`).join('')||'<div class="muted">Keine Termine heute.</div>'}</div><div class="card"><h2>Offene Aufträge</h2><div class="list">${open.slice(0,8).map(orderCard).join('')||'<div class="muted">Keine offenen Aufträge.</div>'}</div></div>`}
function orderCard(o){let s=sumOrder(o);return `<div class="item"><div class="row"><b>${esc(o.nr)}</b><span class="pill status-${(o.status||'Neu').split(' ')[0]}">${esc(o.status||'Neu')}</span><span class="right money">${€(s.total)}</span></div><div>${esc(o.customer)} · ${esc(o.bike||'')}</div><div class="muted">${esc(o.work||'')}</div><div class="row"><button class="small" onclick="editOrder('${o.id}')">bearbeiten</button><button class="small secondary" onclick="invoice('${o.id}')">Rechnung</button><button class="small ok" onclick="wa('${o.id}')">WhatsApp fertig</button></div></div>`}
function renderOrders(){document.getElementById('auftraege').innerHTML=`<div class="grid"><div class="card col-4"><h2>${editing?'Auftrag bearbeiten':'Neuer Auftrag'}</h2><input id="o_customer" placeholder="Kunde"><input id="o_phone" placeholder="Telefon/WhatsApp"><input id="o_bike" placeholder="Fahrrad / Modell"><input id="o_serial" placeholder="Seriennummer"><select id="o_status"><option>Neu</option><option>Warten auf Teile</option><option>In Arbeit</option><option>Fertig</option><option>Bezahlt</option></select><textarea id="o_work" placeholder="Diagnose / Notizen"></textarea><label>Leistungen auswählen</label><div id="serviceChecks" class="list"></div><label>Material aus Lager hinzufügen</label><div class="row"><select id="matSelect"></select><input id="matQty" type="number" value="1" min="1" style="max-width:90px"><button type="button" onclick="addMatTemp()">+ Teil</button></div><div id="tempMats"></div><label>Bilder zum Auftrag</label><input id="o_images" type="file" multiple accept="image/*" onchange="addImages(event)"><div id="imgPreview"></div><button onclick="saveOrder()">${editing?'Änderungen speichern':'Auftrag speichern'}</button><button class="secondary" onclick="clearOrderForm()">Abbrechen / Neu</button></div><div class="card col-8"><h2>Aufträge</h2><input id="orderSearch" oninput="renderOrderList()" placeholder="Suche Kunde, Telefon, Fahrrad, Auftragsnummer"><div id="orderList" class="list"></div></div></div>`;renderOrderForm();renderOrderList()}
let temp={services:[],materials:[],images:[]};
function renderOrderForm(){let o=editing?S.orders.find(x=>x.id==editing):null; if(o){temp={services:[...o.services],materials:[...o.materials],images:[...o.images||[]]}} else if(!temp.services) temp={services:[],materials:[],images:[]}; setTimeout(()=>{['customer','phone','bike','serial','status','work'].forEach(k=>{let el=document.getElementById('o_'+k);if(el)el.value=o?.[k]|| (k=='status'?'Neu':'')});document.getElementById('serviceChecks').innerHTML=S.services.map(s=>`<label class="item"><input type="checkbox" ${temp.services.some(x=>x.id==s.id)?'checked':''} onchange="toggleService('${s.id}',this.checked)"> <b>${esc(s.name)}</b> <span class="right money">${€(s.price)}</span><br><span class="muted">${esc(s.desc||'')}</span></label>`).join('');document.getElementById('matSelect').innerHTML=S.inventory.map(i=>`<option value="${i.id}">${esc(i.name)} · Bestand ${i.stock} · VK ${€(i.vk)}</option>`).join('');renderTempMats();renderImgs()},0)}
function toggleService(id,on){let s=S.services.find(x=>x.id==id); if(on && !temp.services.some(x=>x.id==id)){temp.services.push({id:s.id,name:s.name,price:s.price});(s.parts||[]).forEach(p=>autoAddPart(p))} if(!on) temp.services=temp.services.filter(x=>x.id!=id); renderTempMats()}
function autoAddPart(p){let it=S.inventory.find(i=>i.id==p.id); if(!it)return; temp.materials.push({id:it.id,name:it.name,qty:p.qty||1,ek:it.ek,vk:it.vk,auto:true})}
function addMatTemp(){let id=document.getElementById('matSelect').value;let q=Number(document.getElementById('matQty').value||1);let i=S.inventory.find(x=>x.id==id);if(i){temp.materials.push({id:i.id,name:i.name,qty:q,ek:i.ek,vk:i.vk});renderTempMats()}}
function renderTempMats(){let d=document.getElementById('tempMats'); if(!d)return; d.innerHTML=temp.materials.map((m,i)=>`<div class="item row"><span>${esc(m.name)} x ${m.qty} ${m.auto?'<span class="pill">auto</span>':''}</span><span class="right money">${€(m.vk*m.qty)}</span><button class="small bad" onclick="temp.materials.splice(${i},1);renderTempMats()">x</button></div>`).join('')}
function addImages(e){[...e.target.files].forEach(f=>{let r=new FileReader();r.onload=()=>{temp.images.push(r.result);renderImgs()};r.readAsDataURL(f)})}
function renderImgs(){let d=document.getElementById('imgPreview');if(!d)return;d.innerHTML=temp.images.map((im,i)=>`<span><img class="thumb" src="${im}"><button class="small bad" onclick="temp.images.splice(${i},1);renderImgs()">x</button></span>`).join('')}
function saveOrder(){let o={id:editing||uid('A'),nr:editing?(S.orders.find(x=>x.id==editing)?.nr):('AW-'+String(S.orders.length+1).padStart(4,'0')),date:today(),customer:o_customer.value,phone:o_phone.value,bike:o_bike.value,serial:o_serial.value,status:o_status.value,work:o_work.value,services:temp.services,materials:temp.materials,images:temp.images}; if(!o.customer)return alert('Kunde fehlt'); if(editing){let idx=S.orders.findIndex(x=>x.id==editing);S.orders[idx]=o}else{S.orders.unshift(o);applyStockAndPurchases(o)} editing=null;temp={services:[],materials:[],images:[]};save()}
function applyStockAndPurchases(o){o.materials.forEach(m=>{let it=S.inventory.find(i=>i.id==m.id);if(it){it.stock=Number(it.stock)-Number(m.qty||1); if(it.stock<0)S.purchaseQueue.push({id:uid('B'),orderId:o.id,nr:o.nr,customer:o.customer,part:m.name,qty:Math.abs(it.stock),status:'Offen',date:today()})}})}
function editOrder(id){editing=id;show('auftraege');renderOrders();setTimeout(()=>scrollTo(0,0),50)}function clearOrderForm(){editing=null;temp={services:[],materials:[],images:[]};renderOrders()}
function renderOrderList(){let q=(document.getElementById('orderSearch')?.value||'').toLowerCase();let arr=S.orders.filter(o=>JSON.stringify(o).toLowerCase().includes(q));document.getElementById('orderList').innerHTML=arr.map(orderCard).join('')||'<div class="muted">Keine Treffer.</div>'}
function renderAppointments(){document.getElementById('termine').innerHTML=`<div class="grid"><div class="card col-4"><h2>Termin anlegen</h2><input id="ap_date" type="date" value="${today()}"><input id="ap_time" type="time" value="09:00"><input id="ap_customer" placeholder="Kunde"><input id="ap_phone" placeholder="Telefon"><input id="ap_title" placeholder="z.B. Frühjahrs-Check"><textarea id="ap_note" placeholder="Notiz"></textarea><button onclick="saveAppointment()">Termin speichern</button></div><div class="card col-8"><h2>Kalender</h2><div class="list">${S.appointments.sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time)).map(a=>`<div class="item"><b>${a.date} ${a.time}</b> · ${esc(a.customer)}<br>${esc(a.title)}<br><span class="muted">${esc(a.note||'')}</span><div class="row"><button class="small" onclick="appointmentToOrder('${a.id}')">in Auftrag</button><button class="small bad" onclick="delAppointment('${a.id}')">löschen</button></div></div>`).join('')||'<div class="muted">Keine Termine.</div>'}</div></div></div>`}
function saveAppointment(){S.appointments.push({id:uid('T'),date:ap_date.value,time:ap_time.value,customer:ap_customer.value,phone:ap_phone.value,title:ap_title.value,note:ap_note.value});save()}function delAppointment(id){S.appointments=S.appointments.filter(a=>a.id!=id);save()}function appointmentToOrder(id){let a=S.appointments.find(x=>x.id==id);editing=null;temp={services:[],materials:[],images:[]};show('auftraege');renderOrders();setTimeout(()=>{o_customer.value=a.customer;o_phone.value=a.phone;o_work.value=a.title+'\n'+(a.note||'')},50)}
function renderCustomers(){let names={};S.orders.forEach(o=>{names[o.customer]=names[o.customer]||[];names[o.customer].push(o)});document.getElementById('kunden').innerHTML=`<div class="card"><h2>Kundenhistorie</h2>${Object.entries(names).map(([k,os])=>`<div class="item"><b>${esc(k)}</b><br>${os.map(o=>`<span class="pill">${esc(o.nr)} ${esc(o.bike)} ${€(sumOrder(o).total)}</span>`).join('')}</div>`).join('')||'<div class="muted">Noch keine Kunden.</div>'}</div>`}
function renderInventory(){document.getElementById('lager').innerHTML=`<div class="card"><h2>Lager</h2><div class="row"><input id="inv_name" placeholder="Artikel"><input id="inv_cat" placeholder="Kategorie"><input id="inv_stock" type="number" placeholder="Bestand"><input id="inv_min" type="number" placeholder="Minimum"><input id="inv_ek" type="number" step="0.01" placeholder="EK"><input id="inv_vk" type="number" step="0.01" placeholder="VK"><button onclick="addInv()">+ Artikel</button></div><table><tr><th>Artikel</th><th>Kategorie</th><th>Bestand</th><th>EK</th><th>VK</th><th></th></tr>${S.inventory.map(i=>`<tr><td>${esc(i.name)} ${Number(i.stock)<=Number(i.min)?'<span class="pill status-Teile">nachbestellen</span>':''}</td><td>${esc(i.cat)}</td><td><input value="${i.stock}" type="number" onchange="iSet('${i.id}','stock',this.value)"></td><td><input value="${i.ek}" type="number" step="0.01" onchange="iSet('${i.id}','ek',this.value)"></td><td><input value="${i.vk}" type="number" step="0.01" onchange="iSet('${i.id}','vk',this.value)"></td><td><button class="small bad" onclick="delInv('${i.id}')">löschen</button></td></tr>`).join('')}</table></div>`}
function addInv(){S.inventory.push({id:uid('T'),name:inv_name.value,cat:inv_cat.value,stock:Number(inv_stock.value||0),min:Number(inv_min.value||0),ek:Number(inv_ek.value||0),vk:Number(inv_vk.value||0)});save()}function iSet(id,k,v){let i=S.inventory.find(x=>x.id==id);i[k]=['stock','min','ek','vk'].includes(k)?Number(v):v;localStorage.setItem('fw_v8',JSON.stringify(S));}function delInv(id){if(confirm('Artikel löschen?')){S.inventory=S.inventory.filter(i=>i.id!=id);save()}}
function renderPurchases(){document.getElementById('bestellungen').innerHTML=`<div class="card"><h2>Bestellungen für Kunden/Aufträge</h2>${S.purchaseQueue.map(b=>`<div class="item row"><div><b>${esc(b.part)}</b> x ${b.qty}<br>${esc(b.customer)} · ${esc(b.nr)}</div><select class="right" onchange="b.status=this.value;save()"><option ${b.status=='Offen'?'selected':''}>Offen</option><option ${b.status=='Bestellt'?'selected':''}>Bestellt</option><option ${b.status=='Geliefert'?'selected':''}>Geliefert</option><option ${b.status=='Eingebaut'?'selected':''}>Eingebaut</option></select></div>`).join('')||'<div class="muted">Keine offenen Bestellungen.</div>'}</div>`;renderPurchaseInvoices()}
function renderPurchaseInvoices(){document.getElementById('einkauf').innerHTML=`<div class="grid"><div class="card col-5"><h2>EK-Rechnung importieren</h2><label>Standard VK-Aufschlag in %</label><input id="markup" type="number" value="${S.settings.markup}" onchange="S.settings.markup=Number(this.value);save()"><label>Lieferant</label><input id="pi_supplier" placeholder="Lieferant"><label>PDF hochladen</label><input type="file" accept="application/pdf" onchange="readPdf(event)"><div class="notice">PDF wird im Browser mit PDF.js gelesen. Wenn eine Rechnung schlecht erkannt wird: Text aus PDF kopieren und unten einfügen.</div><label>Erkannter Text / CSV / manuelle Zeilen</label><textarea id="pi_text" placeholder="Beispiel: 10; Schlauch SV19; 3,25"></textarea><button onclick="parseInvoiceText()">Text in Artikel umwandeln</button><div id="parsedItems"></div><button class="ok" onclick="bookParsed()">ins Lager übernehmen</button></div><div class="card col-7"><h2>Lieferanten-Rechnungsarchiv</h2>${S.purchaseInvoices.map(p=>`<div class="item"><b>${esc(p.supplier)}</b> · ${esc(p.date)} · ${esc(p.nr||'ohne Nr.')} <span class="right money">${€(p.total)}</span><br>${p.items.map(i=>`<span class="pill">${i.qty}x ${esc(i.name)} EK ${€(i.ek)} VK ${€(i.vk)}</span>`).join('')}</div>`).join('')||'<div class="muted">Noch keine EK-Rechnungen.</div>'}</div></div>`}
let parsed=[];async function readPdf(e){let f=e.target.files[0];if(!f)return;try{pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';let buf=await f.arrayBuffer();let pdf=await pdfjsLib.getDocument({data:buf}).promise;let text='';for(let p=1;p<=pdf.numPages;p++){let pg=await pdf.getPage(p);let c=await pg.getTextContent();text+=c.items.map(i=>i.str).join(' ')+'\n'}document.getElementById('pi_text').value=text}catch(err){alert('PDF konnte nicht automatisch gelesen werden. Bitte Text aus der PDF kopieren und einfügen.')}}
function parseInvoiceText(){let text=pi_text.value;let lines=text.split(/\n|\r/).map(x=>x.trim()).filter(Boolean);parsed=[];for(let line of lines){let m=line.match(/(\d+(?:[,.]\d+)?)\s*[xX; ]+(.{3,}?)\s*[; ]+(\d+[,.]\d{2})\s*(?:€|EUR)?/); if(m){let qty=Number(m[1].replace(',','.'));let name=m[2].replace(/\s+/g,' ').trim();let ek=Number(m[3].replace(',','.'));let vk=+(ek*(1+Number(S.settings.markup||0)/100)).toFixed(2);parsed.push({qty,name,ek,vk,cat:autoCat(name)})}}
if(!parsed.length){alert('Keine Artikel erkannt. Nutze Format: Menge; Artikelname; EK-Preis')}renderParsed()}
function autoCat(n){n=n.toLowerCase();if(n.includes('schlauch'))return 'Schläuche';if(n.includes('kette')||n.includes('kassette'))return 'Antrieb';if(n.includes('brems'))return 'Bremsen';if(n.includes('reifen'))return 'Reifen';return 'Ersatzteile'}
function renderParsed(){document.getElementById('parsedItems').innerHTML=parsed.map((i,idx)=>`<div class="item"><div class="row"><input value="${esc(i.name)}" onchange="parsed[${idx}].name=this.value"><input type="number" value="${i.qty}" onchange="parsed[${idx}].qty=Number(this.value)" style="max-width:80px"><input type="number" step="0.01" value="${i.ek}" onchange="parsed[${idx}].ek=Number(this.value);parsed[${idx}].vk=+(parsed[${idx}].ek*(1+S.settings.markup/100)).toFixed(2);renderParsed()" style="max-width:100px"><input type="number" step="0.01" value="${i.vk}" onchange="parsed[${idx}].vk=Number(this.value)" style="max-width:100px"></div><span class="muted">Kategorie ${i.cat}</span></div>`).join('')}
function bookParsed(){if(!parsed.length)return alert('Erst Artikel umwandeln.');parsed.forEach(p=>{let ex=S.inventory.find(i=>i.name.toLowerCase()==p.name.toLowerCase());if(ex){ex.stock=Number(ex.stock)+Number(p.qty);ex.ek=p.ek;ex.vk=p.vk}else S.inventory.push({id:uid('T'),name:p.name,cat:p.cat,stock:p.qty,min:1,ek:p.ek,vk:p.vk})});S.purchaseInvoices.unshift({id:uid('EK'),supplier:pi_supplier.value||'Lieferant',date:today(),nr:'',items:parsed,total:parsed.reduce((a,i)=>a+i.qty*i.ek,0)});parsed=[];save();alert('EK-Rechnung übernommen und Lager aktualisiert.')}
function renderServices(){document.getElementById('leistungen').innerHTML=`<div class="card"><h2>Leistungen bearbeiten</h2><div class="row"><input id="s_name" placeholder="Leistung"><input id="s_price" type="number" placeholder="Preis"><input id="s_min" type="number" placeholder="Minuten"><input id="s_desc" placeholder="Beschreibung"><button onclick="addService()">+ Leistung</button></div>${S.services.map(s=>`<div class="item"><div class="row"><input value="${esc(s.name)}" onchange="sSet('${s.id}','name',this.value)"><input type="number" value="${s.price}" onchange="sSet('${s.id}','price',this.value)" style="max-width:100px"><button class="small bad" onclick="delService('${s.id}')">löschen</button></div><span class="muted">Automatische Lagerteile für diese Leistung:</span><div class="row"><select id="part_${s.id}">${S.inventory.map(i=>`<option value="${i.id}">${esc(i.name)}</option>`).join('')}</select><input id="partq_${s.id}" type="number" value="1" style="max-width:80px"><button class="small" onclick="addServicePart('${s.id}')">Teil verknüpfen</button></div>${(s.parts||[]).map((p,idx)=>`<span class="pill">${p.qty}x ${esc(S.inventory.find(i=>i.id==p.id)?.name||'Teil')} <button class="small bad" onclick="S.services.find(x=>x.id=='${s.id}').parts.splice(${idx},1);save()">x</button></span>`).join('')}</div>`).join('')}</div>`}
function addService(){S.services.push({id:uid('L'),name:s_name.value,price:Number(s_price.value||0),minutes:Number(s_min.value||0),desc:s_desc.value,parts:[]});save()}function sSet(id,k,v){let s=S.services.find(x=>x.id==id);s[k]=k=='price'?Number(v):v;localStorage.setItem('fw_v8',JSON.stringify(S));}function delService(id){S.services=S.services.filter(s=>s.id!=id);save()}function addServicePart(id){let s=S.services.find(x=>x.id==id);s.parts=s.parts||[];s.parts.push({id:document.getElementById('part_'+id).value,qty:Number(document.getElementById('partq_'+id).value||1)});save()}
function monthRevenue(){let ym=new Date().toISOString().slice(0,7);return S.orders.filter(o=>(o.date||'').startsWith(ym)).reduce((a,o)=>a+sumOrder(o).total,0)}function renderStats(){let rev=S.orders.reduce((a,o)=>a+sumOrder(o).total,0), prof=S.orders.reduce((a,o)=>a+sumOrder(o).profit,0);document.getElementById('statistik').innerHTML=`<div class="grid"><div class="card col-4"><div class="muted">Umsatz gesamt</div><div class="big">${€(rev)}</div></div><div class="card col-4"><div class="muted">Gewinn Material/Leistung</div><div class="big">${€(prof)}</div></div><div class="card col-4"><div class="muted">Aufträge</div><div class="big">${S.orders.length}</div></div></div><div class="card"><h2>Top-Leistungen</h2>${topServices().map(x=>`<span class="pill">${esc(x[0])}: ${x[1]}x</span>`).join('')}</div>`}function topServices(){let m={};S.orders.forEach(o=>o.services.forEach(s=>m[s.name]=(m[s.name]||0)+1));return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,15)}
function renderBackup(){document.getElementById('backup').innerHTML=`<div class="card"><h2>Einstellungen & Backup</h2><label>Werkstattname</label><input value="${esc(S.settings.name)}" onchange="S.settings.name=this.value;save()"><label>Adresse</label><input value="${esc(S.settings.address)}" onchange="S.settings.address=this.value;save()"><label>Telefon</label><input value="${esc(S.settings.phone)}" onchange="S.settings.phone=this.value;save()"><label>IBAN</label><input value="${esc(S.settings.iban)}" onchange="S.settings.iban=this.value;save()"><div class="row"><button onclick="exportData()">Backup exportieren</button><input type="file" onchange="importData(event)" accept="application/json"></div><div class="notice danger">Wichtig: Daten werden im Browser dieses Geräts gespeichert. Regelmäßig Backup exportieren.</div></div>`}
function exportData(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(S,null,2)],{type:'application/json'}));a.download='werkstatt-backup-'+today()+'.json';a.click()}function importData(e){let f=e.target.files[0];let r=new FileReader();r.onload=()=>{S=JSON.parse(r.result);save()};r.readAsText(f)}
function invoice(id){selectedInvoice=S.orders.find(o=>o.id==id);renderInvoice();show('rechnung')}function renderInvoice(){let o=selectedInvoice;if(!o)return;let s=sumOrder(o);let link=APP_URL+'?auftrag='+encodeURIComponent(o.nr);let qr='https://api.qrserver.com/v1/create-qr-code/?size=160x160&data='+encodeURIComponent(link);document.getElementById('rechnung').innerHTML=`<div class="noPrint row"><button onclick="show('auftraege')">← Zurück</button><button onclick="window.print()">Drucken / PDF</button><button class="ok" onclick="oPaid('${o.id}')">als bezahlt markieren</button></div><div class="invoice"><div class="row"><div><h1>Rechnung</h1><b>${esc(S.settings.name)}</b><br>${esc(S.settings.address||'')}<br>${esc(S.settings.phone||'')}</div><img class="qr right" src="${qr}"></div><hr><div class="row"><div><b>Rechnung/Auftrag:</b> ${esc(o.nr)}<br><b>Datum:</b> ${esc(o.date)}<br><b>Kunde:</b> ${esc(o.customer)}<br><b>Fahrrad:</b> ${esc(o.bike||'')}<br><b>Seriennummer:</b> ${esc(o.serial||'')}</div></div><h3>Leistungen</h3><table><tr><th>Position</th><th>Preis</th></tr>${o.services.map(x=>`<tr><td>${esc(x.name)}</td><td>${€(x.price)}</td></tr>`).join('')}${o.materials.map(x=>`<tr><td>${esc(x.name)} x ${x.qty}</td><td>${€(x.vk*x.qty)}</td></tr>`).join('')}<tr><th>Gesamt</th><th>${€(s.total)}</th></tr></table><p>${esc(S.settings.invoiceNote)}</p><p><b>QR-Code:</b> führt direkt zum Auftrag in deiner App.</p>${S.settings.iban?`<p><b>IBAN:</b> ${esc(S.settings.iban)}</p>`:''}</div>`}
function oPaid(id){let o=S.orders.find(x=>x.id==id);o.status='Bezahlt';save();invoice(id)}function wa(id){let o=S.orders.find(x=>x.id==id);let msg=`Hallo ${o.customer}, dein Fahrrad ist fertig. Auftrag ${o.nr}. Viele Grüße`;location.href='https://wa.me/'+(o.phone||'').replace(/\D/g,'')+'?text='+encodeURIComponent(msg)}
function renderOrdersSelects(){}
function boot(){nav();renderAll();let params=new URLSearchParams(location.search);let nr=params.get('auftrag');if(nr){let o=S.orders.find(x=>x.nr==nr);if(o){invoice(o.id)}}show(document.querySelector('.tabscreen.active')?.id||'dashboard')}boot();
</script>
