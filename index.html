<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fahrrad Werkstatt V6</title>
<style>
:root{--bg:#f5f7fb;--card:#fff;--txt:#172033;--muted:#667085;--line:#d7dce7;--pri:#1f6feb;--ok:#15803d;--warn:#b45309;--bad:#b91c1c}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--txt)}header{position:sticky;top:0;background:#0f172a;color:white;padding:14px 16px;z-index:2}header h1{margin:0;font-size:20px}.wrap{max-width:1100px;margin:auto;padding:14px}.tabs{display:flex;gap:8px;overflow:auto;margin-bottom:12px}.tabs button{white-space:nowrap;border:0;border-radius:999px;padding:10px 14px;background:#e8edf7}.tabs button.active{background:var(--pri);color:white}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px}.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:0 1px 2px #0001}label{font-size:13px;color:var(--muted);display:block;margin-top:8px}input,textarea,select{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;background:white;font-size:16px}textarea{min-height:80px}button{padding:10px 12px;border:0;border-radius:10px;background:var(--pri);color:white;font-weight:600}button.secondary{background:#e5e7eb;color:#111827}button.danger{background:var(--bad)}button.ok{background:var(--ok)}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.pill{display:inline-block;padding:5px 9px;border-radius:999px;background:#eef2ff;margin:3px;font-size:13px}.status{font-weight:700}.small{font-size:13px;color:var(--muted)}.money{font-size:22px;font-weight:800}.list{display:flex;flex-direction:column;gap:8px}.item{border:1px solid var(--line);border-radius:12px;padding:10px;background:#fff}.checkline{display:grid;grid-template-columns:24px 1fr auto;gap:8px;align-items:center}.warn{color:var(--warn);font-weight:700}.bad{color:var(--bad);font-weight:700}.oktxt{color:var(--ok);font-weight:700}.hide{display:none}table{width:100%;border-collapse:collapse}td,th{border-bottom:1px solid var(--line);padding:8px;text-align:left}.invoicebar{position:sticky;top:0;background:#fff;border:1px solid var(--line);border-radius:14px;padding:10px;margin-bottom:12px;z-index:3}.split{display:grid;grid-template-columns:1fr 1fr;gap:8px}@media(max-width:700px){.split{grid-template-columns:1fr}}@media print{header,.tabs,.noPrint,button,.invoicebar{display:none!important}body{background:white}.card{box-shadow:none;border:0}.wrap{max-width:none}}
</style>
</head>
<body><header><h1>🚲 Fahrrad Werkstatt V6</h1><div class="small" style="color:#cbd5e1">Private App – Daten bleiben im Browser</div></header><div class="wrap">
<div class="tabs noPrint" id="tabs"></div>
<div id="app"></div>
</div>
<script>
const LS='fw_v6_data';
let old=localStorage.getItem('fw_v5_data');
let state=JSON.parse(localStorage.getItem(LS)||old||'null')||{settings:{shop:'Meine Fahrradwerkstatt',hourly:45,invoicePrefix:'RE'},orders:[],services:null,stock:[],customers:[],purchases:[]};
if(!state.purchases)state.purchases=[];
if(!state.stock)state.stock=[];
if(!state.services){state.services=[
{name:'Frühjahrs-Check',price:55,desc:'Putzen, Schaltung/Bremsen einstellen, Durchsicht, Schrauben prüfen',req:[]},
{name:'Kleine Inspektion',price:79,desc:'Komplettkontrolle, Schaltung, Bremsen, Kette, Reifendruck',req:[]},
{name:'Große Inspektion',price:129,desc:'Großer Service inkl. Lager-/Laufrad-/Antriebsprüfung',req:[]},
{name:'Reifen wechseln',price:20,desc:'Reifen aus- und einbauen, Luftdruck prüfen',req:[]},
{name:'Schlauch wechseln',price:15,desc:'Schlauch ersetzen, Mantel prüfen',req:[]},
{name:'Schaltung einstellen',price:20,desc:'Schaltwerk/Umwerfer einstellen',req:[]},
{name:'Bremsen einstellen',price:15,desc:'Bremsanlage prüfen und einstellen',req:[]},
{name:'Kette wechseln',price:25,desc:'Kette ersetzen und Länge anpassen',req:[]},
{name:'Kassette wechseln',price:25,desc:'Kassette ersetzen',req:[]},
{name:'Bremsbeläge wechseln',price:20,desc:'Beläge wechseln und Bremse einstellen',req:[]},
{name:'Laufrad zentrieren',price:25,desc:'Seitenschlag korrigieren',req:[]},
{name:'E-Bike Diagnose',price:35,desc:'Fehlerspeicher/Antrieb/Akku prüfen',req:[]}];}
state.services.forEach(s=>{if(!s.req)s.req=[]});
if(state.stock.length==0){state.stock=[
{name:'Schlauch 28 Zoll AV',qty:4,min:2,buy:4,sell:8},
{name:'Schlauch 28 Zoll SV',qty:4,min:2,buy:4,sell:8},
{name:'Bremsbeläge Shimano B05S',qty:2,min:1,buy:6,sell:12},
{name:'Kette 8-fach',qty:2,min:1,buy:10,sell:18},
{name:'Kette 10-fach',qty:1,min:1,buy:16,sell:25}
];}
let tab='auftrag'; const tabs=['auftrag:Neuer Auftrag','auftraege:Aufträge','bestellungen:Bestellungen','kunden:Kunden','leistungen:Leistungen','lager:Lager','statistik:Statistik','backup:Backup'];
function save(){localStorage.setItem(LS,JSON.stringify(state))}
function esc(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function eur(n){return (Number(n)||0).toFixed(2).replace('.',',')+' €'}
function id(){return 'A-'+new Date().getFullYear()+'-'+String(state.orders.length+1).padStart(4,'0')}
function pid(){return 'B-'+Date.now().toString().slice(-6)}
function total(o){return (o.services||[]).reduce((s,x)=>s+Number(x.price||0),0)+(o.parts||[]).reduce((s,x)=>s+Number(x.sell||0)*Number(x.qty||1),0)+Number(o.extra||0)}
function cost(o){return (o.parts||[]).reduce((s,x)=>s+Number(x.buy||0)*Number(x.qty||1),0)}
function nav(){document.getElementById('tabs').innerHTML=tabs.map(t=>{let [k,l]=t.split(':');let badge=k=='bestellungen'?state.purchases.filter(p=>p.status!='Erledigt').length:'';return `<button class="${tab==k?'active':''}" onclick="tab='${k}';render()">${l}${badge?' ('+badge+')':''}</button>`}).join('')}
function render(){nav(); ({auftrag,kunden,leistungen,lager,statistik,backup,auftraege,bestellungen}[tab])()}
function customerOptions(){return state.customers.map(c=>`<option value="${esc(c.name)}">${esc(c.name)} ${c.phone?'– '+esc(c.phone):''}</option>`).join('')}
function stockOptions(sel=''){return '<option value="">-- Lagerteil wählen --</option>'+state.stock.map((p,i)=>`<option value="${i}" ${String(sel)==String(i)?'selected':''}>${esc(p.name)} · Bestand ${p.qty} · VK ${eur(p.sell)}</option>`).join('')}
function auftrag(){document.getElementById('app').innerHTML=`<div class="grid"><div class="card"><h2>Neuer Auftrag</h2>
<label>Kunde</label><input id="cname" list="clist" placeholder="Name"><datalist id="clist">${customerOptions()}</datalist>
<label>Telefon</label><input id="phone" placeholder="Telefon / WhatsApp">
<label>Fahrrad</label><input id="bike" placeholder="Marke, Modell, Farbe">
<label>Status</label><select id="status"><option>Neu</option><option>Warten auf Teile</option><option>In Arbeit</option><option>Fertig</option><option>Bezahlt</option></select>
<label>Notizen / Diagnose</label><textarea id="notes" placeholder="Was soll gemacht werden?"></textarea>
<h3>Leistungen auswählen</h3><div class="list">${state.services.map((s,i)=>`<label class="checkline"><input type="checkbox" class="svc" value="${i}" onchange="previewServiceParts()"><span><b>${esc(s.name)}</b><br><span class="small">${esc(s.desc||'')}</span>${(s.req||[]).length?'<br><span class="small">Material: '+s.req.map(r=>esc(stockName(r.stockIndex))+' x'+r.qty).join(', ')+'</span>':''}</span><b>${eur(s.price)}</b></label>`).join('')}</div>
<label>Zusatzbetrag / Sonderarbeit €</label><input id="extra" type="number" step="0.01" value="0">
<button onclick="createOrder()">Auftrag speichern</button></div>
<div class="card"><h2>Automatisches Material</h2><div id="autoParts" class="small">Wähle links eine Leistung aus.</div><h2>Material manuell hinzufügen</h2><div id="parts"></div><button class="secondary" onclick="addPartRow()">+ Materialzeile</button><p class="small">Lagerteile werden beim Speichern automatisch vom Bestand abgezogen. Fehlende Teile landen im Tab „Bestellungen“.</p></div></div>`; addPartRow();previewServiceParts()}
function stockName(i){let p=state.stock[i];return p?p.name:'Teil gelöscht'}
function addPartRow(){let d=document.createElement('div');d.className='item partrow';d.innerHTML=`<label>Lagerteil oder frei eingeben</label><select onchange="fillPartFromStock(this)">${stockOptions()}</select><input placeholder="Teil, z.B. Schlauch"><div class="row"><input type="number" step="0.01" placeholder="EK €"><input type="number" step="0.01" placeholder="VK €"><input type="number" step="1" value="1" placeholder="Menge"></div><label class="row small"><input type="checkbox" class="needOrder" style="width:auto"> Muss bestellt werden</label>`;document.getElementById('parts').appendChild(d)}
function fillPartFromStock(sel){let p=state.stock[sel.value];let r=sel.closest('.partrow');let i=r.querySelectorAll('input'); if(p){i[0].value=p.name;i[1].value=p.buy||0;i[2].value=p.sell||0;i[3].value=1;r.dataset.stockIndex=sel.value}else{delete r.dataset.stockIndex}}
function previewServiceParts(){let sv=[...document.querySelectorAll('.svc:checked')].map(x=>state.services[x.value]);let req=[];sv.forEach(s=>(s.req||[]).forEach(r=>req.push({...r,service:s.name})));document.getElementById('autoParts').innerHTML=req.length?req.map(r=>{let p=state.stock[r.stockIndex];let fehl=p?Math.max(0,Number(r.qty||1)-Number(p.qty||0)):Number(r.qty||1);return `<div class="item"><b>${esc(stockName(r.stockIndex))}</b> x${r.qty} <span class="small">für ${esc(r.service)}</span> ${fehl?'<span class="bad">fehlt: '+fehl+'</span>':'<span class="oktxt">auf Lager</span>'}</div>`}).join(''):'Keine automatischen Teile für ausgewählte Leistungen.'}
function collectAutoParts(sv){let parts=[];sv.forEach(s=>(s.req||[]).forEach(r=>{let p=state.stock[r.stockIndex]; if(p)parts.push({name:p.name,buy:+p.buy||0,sell:+p.sell||0,qty:+r.qty||1,stockIndex:+r.stockIndex,auto:true,service:s.name})}));return parts}
function useStockOrPurchase(part,o){if(part.stockIndex===undefined||part.stockIndex==='')return;let p=state.stock[part.stockIndex]; if(!p)return;let q=Number(part.qty||1); if(Number(p.qty||0)>=q){p.qty=Number(p.qty)-q}else{let missing=q-Number(p.qty||0);p.qty=0;state.purchases.push({id:pid(),date:new Date().toISOString().slice(0,10),orderId:o.id,customer:o.customer,phone:o.phone,bike:o.bike,item:p.name,qty:missing,status:'Offen',note:'Automatisch aus Auftrag'})}}
function createOrder(){let name=cname.value.trim(); if(!name)return alert('Kunde fehlt');let sv=[...document.querySelectorAll('.svc:checked')].map(x=>state.services[x.value]);let auto=collectAutoParts(sv);let manual=[...document.querySelectorAll('.partrow')].map(r=>{let i=r.querySelectorAll('input');return {name:i[0].value,buy:+i[1].value||0,sell:+i[2].value||0,qty:+i[3].value||1,stockIndex:r.dataset.stockIndex!==undefined?+r.dataset.stockIndex:undefined,needOrder:r.querySelector('.needOrder').checked}}).filter(p=>p.name);let parts=[...auto,...manual];let o={id:id(),date:new Date().toISOString().slice(0,10),customer:name,phone:phone.value,bike:bike.value,status:status.value,notes:notes.value,services:sv.map(s=>({name:s.name,price:s.price,desc:s.desc})),parts,extra:+extra.value||0,photos:[]};parts.forEach(p=>{if(p.needOrder){state.purchases.push({id:pid(),date:o.date,orderId:o.id,customer:name,phone:phone.value,bike:bike.value,item:p.name,qty:p.qty,status:'Offen',note:'Manuell markiert'})}else useStockOrPurchase(p,o)});state.orders.unshift(o);let ex=state.customers.find(c=>c.name==name);if(!ex)state.customers.push({name,phone:phone.value,bikes:[bike.value].filter(Boolean)});else{ex.phone=ex.phone||phone.value;if(bike.value&&!ex.bikes.includes(bike.value))ex.bikes.push(bike.value)};save();tab='auftraege';render()}
function auftraege(){document.getElementById('app').innerHTML=`<div class="card noPrint"><input id="search" placeholder="Suche Kunde, Fahrrad, Telefon..." oninput="filterOrders(this.value)"></div><div id="olist"></div>`; filterOrders('')}
function filterOrders(q){q=(q||'').toLowerCase();let arr=state.orders.filter(o=>(o.customer+o.phone+o.bike+o.id).toLowerCase().includes(q));document.getElementById('olist').innerHTML=arr.map(o=>`<div class="card"><div class="row"><h3>${esc(o.id)} – ${esc(o.customer)}</h3><span class="pill status">${esc(o.status)}</span></div><div>${esc(o.bike||'')}</div><div class="small">${o.date} · ${esc(o.phone||'')}</div><div>${(o.services||[]).map(s=>`<span class="pill">${esc(s.name)} ${eur(s.price)}</span>`).join('')}</div>${(o.parts||[]).length?'<div class="small">Material: '+o.parts.map(p=>esc(p.name)+' x'+p.qty).join(', ')+'</div>':''}<div class="money">${eur(total(o))}</div><div class="row noPrint"><button onclick="printOrder('${o.id}')">Rechnung/Druck</button><button class="secondary" onclick="whatsapp('${o.id}')">WhatsApp fertig</button><select onchange="setStatus('${o.id}',this.value)"><option>${esc(o.status)}</option><option>Neu</option><option>Warten auf Teile</option><option>In Arbeit</option><option>Fertig</option><option>Bezahlt</option></select><button class="danger" onclick="delOrder('${o.id}')">Löschen</button></div></div>`).join('')||'<div class="card">Keine Aufträge</div>'}
function setStatus(id,v){state.orders.find(o=>o.id==id).status=v;save();render()}function delOrder(id){if(confirm('Auftrag löschen?')){state.orders=state.orders.filter(o=>o.id!=id);state.purchases=state.purchases.filter(p=>p.orderId!=id);save();render()}}
function printOrder(id){let o=state.orders.find(x=>x.id==id);let rows=[...(o.services||[]).map(s=>`<tr><td>${esc(s.name)}</td><td>${esc(s.desc||'')}</td><td>${eur(s.price)}</td></tr>`),...(o.parts||[]).map(p=>`<tr><td>${esc(p.name)} x${p.qty}</td><td>Material${p.auto?' / automatisch':''}</td><td>${eur(p.sell*p.qty)}</td></tr>`)];document.getElementById('app').innerHTML=`<div class="invoicebar noPrint"><div class="row"><button class="secondary" onclick="tab='auftraege';render()">← Zurück zu Aufträgen</button><button onclick="window.print()">Drucken / PDF</button></div></div><div class="card"><h1>${esc(state.settings.shop)}</h1><h2>Rechnung / Auftrag ${esc(o.id)}</h2><p><b>Kunde:</b> ${esc(o.customer)}<br><b>Telefon:</b> ${esc(o.phone||'')}<br><b>Fahrrad:</b> ${esc(o.bike||'')}<br><b>Datum:</b> ${o.date}</p><table>${rows.join('')}<tr><td colspan="2"><b>Gesamt</b></td><td><b>${eur(total(o))}</b></td></tr></table><p>${esc(o.notes||'')}</p></div>`}
function whatsapp(id){let o=state.orders.find(x=>x.id==id);let msg=encodeURIComponent(`Hallo ${o.customer}, dein Fahrrad ist fertig. Gesamtbetrag: ${eur(total(o))}. Viele Grüße`);location.href=`https://wa.me/${(o.phone||'').replace(/\D/g,'')}?text=${msg}`}
function bestellungen(){let arr=state.purchases;document.getElementById('app').innerHTML=`<div class="card"><h2>Bestellungen</h2><p class="small">Hier siehst du Teile, die für Kunden/Aufträge bestellt werden müssen. Du kannst abhaken: offen → bestellt → erledigt.</p><button onclick="addPurchaseManual()">+ Bestellung manuell</button></div>${arr.map((p,i)=>`<div class="card"><div class="row"><h3>${esc(p.item)}</h3><span class="pill">${esc(p.status)}</span></div><div><b>Kunde:</b> ${esc(p.customer||'')} · <b>Auftrag:</b> ${esc(p.orderId||'')}</div><div class="small">${esc(p.bike||'')} · Menge: ${p.qty} · ${p.date}</div><label>Status</label><select onchange="state.purchases[${i}].status=this.value;save();render()"><option>${esc(p.status)}</option><option>Offen</option><option>Bestellt</option><option>Erledigt</option></select><label>Notiz</label><input value="${esc(p.note||'')}" onchange="state.purchases[${i}].note=this.value;save()"><div class="row"><button class="ok" onclick="state.purchases[${i}].status='Bestellt';save();render()">Bestellt</button><button class="secondary" onclick="receivePurchase(${i})">Erhalten + ins Lager</button><button class="danger" onclick="state.purchases.splice(${i},1);save();render()">Löschen</button></div></div>`).join('')||'<div class="card">Keine Bestellungen offen.</div>'}`}
function addPurchaseManual(){state.purchases.unshift({id:pid(),date:new Date().toISOString().slice(0,10),orderId:'',customer:'',phone:'',bike:'',item:'Neues Teil',qty:1,status:'Offen',note:''});save();render()}
function receivePurchase(i){let p=state.purchases[i];let s=state.stock.find(x=>x.name==p.item);if(s)s.qty=Number(s.qty||0)+Number(p.qty||1);else state.stock.push({name:p.item,qty:Number(p.qty||1),min:1,buy:0,sell:0});p.status='Erledigt';save();render()}
function kunden(){document.getElementById('app').innerHTML=state.customers.map(c=>`<div class="card"><h3>${esc(c.name)}</h3><div>${esc(c.phone||'')}</div><div>${(c.bikes||[]).map(b=>`<span class="pill">${esc(b)}</span>`).join('')}</div><h4>Historie</h4>${state.orders.filter(o=>o.customer==c.name).map(o=>`<div class="item">${o.date} · ${esc(o.id)} · ${eur(total(o))} · ${esc(o.status)}</div>`).join('')||'Keine Aufträge'}</div>`).join('')||'<div class="card">Keine Kunden</div>'}
function leistungen(){document.getElementById('app').innerHTML=`<div class="card"><h2>Leistungen bearbeiten</h2><p class="small">Bei jeder Leistung kannst du Lagerteile hinterlegen. Beispiel: „Schlauch wechseln“ → Schlauch x1. Beim Auftrag wird das Material automatisch eingefügt und vom Lager abgezogen.</p><div id="svclist">${state.services.map((s,i)=>`<div class="item"><label>Name</label><input value="${esc(s.name)}" onchange="state.services[${i}].name=this.value;save()"><label>Preis €</label><input type="number" value="${s.price}" onchange="state.services[${i}].price=+this.value;save()"><label>Beschreibung</label><textarea onchange="state.services[${i}].desc=this.value;save()">${esc(s.desc||'')}</textarea><h4>Automatische Lagerteile</h4><div>${(s.req||[]).map((r,ri)=>`<div class="row"><select onchange="state.services[${i}].req[${ri}].stockIndex=+this.value;save();render()">${stockOptions(r.stockIndex)}</select><input style="max-width:100px" type="number" value="${r.qty}" onchange="state.services[${i}].req[${ri}].qty=+this.value;save()"><button class="danger" onclick="state.services[${i}].req.splice(${ri},1);save();render()">X</button></div>`).join('')||'<div class="small">Keine Lagerteile hinterlegt.</div>'}</div><button class="secondary" onclick="state.services[${i}].req.push({stockIndex:0,qty:1});save();render()">+ Lagerteil zur Leistung</button><button class="danger" onclick="state.services.splice(${i},1);save();render()">Leistung löschen</button></div>`).join('')}</div><button onclick="state.services.push({name:'Neue Leistung',price:0,desc:'',req:[]});save();render()">+ Leistung</button></div>`}
function lager(){document.getElementById('app').innerHTML=`<div class="card"><h2>Lager</h2><p class="small">EK = Einkaufspreis, VK = Preis auf Rechnung.</p>${state.stock.map((p,i)=>`<div class="item"><label>Teil</label><input value="${esc(p.name)}" onchange="state.stock[${i}].name=this.value;save()"><div class="split"><div><label>Bestand</label><input type="number" value="${p.qty}" onchange="state.stock[${i}].qty=+this.value;save();render()"></div><div><label>Mindestbestand</label><input type="number" value="${p.min}" onchange="state.stock[${i}].min=+this.value;save();render()"></div><div><label>EK €</label><input type="number" step="0.01" value="${p.buy||0}" onchange="state.stock[${i}].buy=+this.value;save()"></div><div><label>VK €</label><input type="number" step="0.01" value="${p.sell||0}" onchange="state.stock[${i}].sell=+this.value;save()"></div></div><span class="${p.qty<=p.min?'bad':'oktxt'}">${p.qty<=p.min?'Nachbestellen':'OK'}</span><br><button class="danger" onclick="state.stock.splice(${i},1);save();render()">Löschen</button></div>`).join('')}<button onclick="state.stock.push({name:'Neues Teil',qty:0,min:1,buy:0,sell:0});save();render()">+ Lagerteil</button></div>`}
function statistik(){let paid=state.orders.filter(o=>o.status=='Bezahlt');let um=paid.reduce((s,o)=>s+total(o),0), ek=paid.reduce((s,o)=>s+cost(o),0);document.getElementById('app').innerHTML=`<div class="grid"><div class="card"><h2>Umsatz bezahlt</h2><div class="money">${eur(um)}</div></div><div class="card"><h2>Material EK</h2><div class="money">${eur(ek)}</div></div><div class="card"><h2>Geschätzter Gewinn</h2><div class="money">${eur(um-ek)}</div></div><div class="card"><h2>Offene Bestellungen</h2><div class="money">${state.purchases.filter(p=>p.status!='Erledigt').length}</div></div></div>`}
function backup(){document.getElementById('app').innerHTML=`<div class="card"><h2>Backup</h2><button onclick="downloadBackup()">Backup exportieren</button><label>Backup importieren</label><input type="file" onchange="importBackup(this.files[0])"><h3>Einstellungen</h3><label>Werkstattname</label><input value="${esc(state.settings.shop)}" onchange="state.settings.shop=this.value;save()"><label>Stundensatz</label><input type="number" value="${state.settings.hourly}" onchange="state.settings.hourly=+this.value;save()"></div>`}
function downloadBackup(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));a.download='werkstatt-backup.json';a.click()}
function importBackup(f){let r=new FileReader();r.onload=()=>{state=JSON.parse(r.result);save();render()};r.readAsText(f)}
save();render();
</script></body></html>
