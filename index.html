<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fahrrad Werkstatt</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>🚲 Fahrrad Werkstatt</h1>
</header>

<div class="container">

<div class="card">
<h2>Neuer Auftrag</h2>

<label>Kunde</label>
<input id="kunde" type="text">

<label>Fahrrad</label>
<input id="fahrrad" type="text">

<label>Leistung</label>
<select id="leistung">
<option>Frühjahrs-Check</option>
<option>Reifenwechsel</option>
<option>Schlauch wechseln</option>
<option>Bremsen einstellen</option>
<option>Schaltung einstellen</option>
<option>Kette wechseln</option>
<option>Große Inspektion</option>
</select>

<label>Preis €</label>
<input id="preis" type="number">

<button onclick="speichern()">Auftrag speichern</button>

</div>

<div class="card">
<h2>Aufträge</h2>
<div id="auftragsliste"></div>
</div>

</div>

<script src="app.js"></script>

</body>
</html>
