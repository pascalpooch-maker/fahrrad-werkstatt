<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fahrrad Werkstatt Pro V9.2</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>🚲 Fahrrad Werkstatt Pro V9.2</h1>
<p>Aufträge · Kunden · Lager · Rechnungen · Kalender · Wareneingang</p>
</header>

<div class="container">

<nav class="tabbar">
<button onclick="zeigeTab('dashboard')">Dashboard</button>
<button onclick="zeigeTab('auftrag')">Auftrag</button>
<button onclick="zeigeTab('liste')">Aufträge</button>
<button onclick="zeigeTab('kunden')">Kunden</button>
<button onclick="zeigeTab('lager')">Lager</button>
<button onclick="zeigeTab('wareneingang')">Wareneingang</button>
<button onclick="zeigeTab('bestellungen')">Bestellungen</button>
<button onclick="zeigeTab('kalender')">Kalender</button>
<button onclick="zeigeTab('belege')">Belege</button>
<button onclick="zeigeTab('leistungen')">Leistungen</button>
<button onclick="zeigeTab('rechnung')">Rechnung</button>
<button onclick="zeigeTab('einstellungen')">Einstellungen</button>
<button onclick="zeigeTab('backup')">Backup</button>
</nav>

<section id="dashboard" class="tab card">
<h2>📊 Dashboard</h2>
<div id="dashboardInhalt"></div>
</section>

<section id="auftrag" class="tab card">
<h2 id="formularTitel">Neuer Auftrag</h2>

<input type="hidden" id="editId">

<label>Kunde</label>
<input id="kunde" type="text">

<label>Telefon</label>
<input id="telefon" type="text">

<label>E-Mail</label>
<input id="email" type="email">

<label>Adresse</label>
<textarea id="kundenAdresse"></textarea>

<label>Fahrrad</label>
<input id="fahrrad" type="text">

<label>Seriennummer</label>
<input id="seriennummer" type="text">

<label>Leistungen</label>
<div id="leistungenContainer"></div>

<label>Zusatzarbeiten</label>
<textarea id="notiz"></textarea>

<label>Lagerartikel zum Auftrag hinzufügen</label>
<select id="auftragLagerArtikel"></select>

<button onclick="lagerArtikelZumAuftrag()">Lagerartikel hinzufügen</button>

<label>Material / Teile</label>
<textarea id="material"></textarea>

<label>Materialpreis VK €</label>
<input id="materialpreis" type="number" step="0.01">

<label>Status</label>
<select id="status">
<option>Offen</option>
<option>Warten auf Teile</option>
<option>In Arbeit</option>
<option>Fertig</option>
<option>Bezahlt</option>
<option>Storniert</option>
</select>

<label>Zahlungsart</label>
<select id="zahlungsart">
<option>Offen</option>
<option>Bar</option>
<option>Überweisung</option>
<option>Karte</option>
</select>

<label>Bilder</label>
<input id="bilder" type="file" accept="image/*" multiple>

<button onclick="auftragSpeichern()">Auftrag speichern</button>
<button onclick="formularLeeren()">Neuer Auftrag</button>
</section>

<section id="liste" class="tab card">
<h2>📋 Aufträge</h2>
<input id="suche" placeholder="Suche nach Kunde, Fahrrad oder Status..." oninput="auftraegeAnzeigen()">
<div id="auftragsliste"></div>
</section>

<section id="kunden" class="tab card">
<h2>👤 Kundenakte</h2>
<div id="kundenListe"></div>
</section>

<section id="lager" class="tab card">
<h2>📦 Lager</h2>

<input type="hidden" id="lagerEditId">

<label>Artikel</label>
<input id="lagerName">

<label>Kategorie</label>
<select id="lagerKategorie"></select>

  <label>Lieferant</label>
<input id="lagerLieferant" placeholder="z.B. Bike-Discount">

<label>Neue Kategorie</label>
<input id="neueKategorie" placeholder="z.B. E-Bike, Werkzeug, Pflege">
<button onclick="kategorieSpeichern()">Kategorie hinzufügen</button>

<label>Bestand</label>
<input id="lagerBestand" type="number">

<label>Mindestbestand</label>
<input id="lagerMinimum" type="number" value="2">

<label>EK €</label>
<input id="lagerEk" type="number" step="0.01">

<label>Aufschlag %</label>
<input id="lagerAufschlag" type="number" value="50">

<button onclick="lagerSpeichern()">Artikel speichern</button>
<div id="lagerListe"></div>
</section>

<section id="wareneingang" class="tab card">
<h2>📦 Wareneingang</h2>

<label>Lieferant</label>
<input id="weLieferant">

<label>Rechnungsnummer</label>
<input id="weNummer">

<label>PDF-Rechnung</label>
<input id="wePdf" type="file" accept="application/pdf">

<hr>

<label>Artikel</label>
<input id="weArtikel">

<label>Menge</label>
<input id="weMenge" type="number" value="1">

<label>EK pro Stück €</label>
<input id="weEk" type="number" step="0.01">

<label>Aufschlag %</label>
<input id="weAufschlag" type="number" value="50">

<button onclick="wareneingangArtikelSpeichern()">Ins Lager buchen</button>
<div id="wareneingangListe"></div>
</section>

<section id="bestellungen" class="tab card">
<h2>📦 Bestellungen</h2>

<label>Kunde</label>
<input id="bestellKunde">

<label>Auftrag / Fahrrad</label>
<input id="bestellAuftrag">

<label>Teil</label>
<input id="bestellTeil">

<label>Status</label>
<select id="bestellStatus">
<option>Offen</option>
<option>Bestellt</option>
<option>Unterwegs</option>
<option>Geliefert</option>
<option>Eingebaut</option>
</select>
  
<label>Fertigstellungstermin</label>
<input id="fertigTermin" type="date">

<label>Erinnerung</label>
<input id="erinnerung" placeholder="z.B. Kunde anrufen, Teile prüfen">

<button onclick="bestellungSpeichern()">Bestellung speichern</button>
<div id="bestellListe"></div>
</section>

<section id="kalender" class="tab card">
<h2>📅 Kalender</h2>

<label>Datum</label>
<input id="terminDatum" type="date">

<label>Uhrzeit</label>
<input id="terminZeit" type="time">

<label>Kunde / Aufgabe</label>
<input id="terminText">

<button onclick="terminSpeichern()">Termin speichern</button>
<div id="terminListe"></div>
</section>

<section id="belege" class="tab card">
<h2>📄 PDF-Belege</h2>

<label>Auftrag zuordnen</label>
<select id="belegAuftrag"></select>

<label>Lieferant</label>
<input id="belegLieferant">

<label>Rechnungsnummer</label>
<input id="belegNummer">

<label>Gesamtbetrag EK €</label>
<input id="belegBetrag" type="number" step="0.01">

<label>PDF auswählen</label>
<input id="belegDatei" type="file" accept="application/pdf">

<button onclick="belegSpeichern()">PDF-Beleg speichern</button>
<div id="belegListe"></div>
</section>

<section id="leistungen" class="tab card">
<h2>🛠️ Leistungen verwalten</h2>

<label>Leistungsname</label>
<input id="leistungName" placeholder="z.B. Laufrad zentrieren">

<label>Arbeitszeit in Stunden</label>
<input id="leistungZeit" type="number" step="0.1" value="1">

<label>Stundensatz €</label>
<input id="leistungStundensatz" type="number" step="0.01" value="45">

<button onclick="leistungSpeichern()">Leistung speichern</button>
<div id="leistungenListe"></div>
</section>

<section id="rechnung" class="tab card">
<h2>🧾 Rechnung</h2>
<div id="rechnungInhalt"></div>
<button onclick="zeigeTab('liste')">Zurück</button>
<button onclick="window.print()">PDF erstellen / Drucken</button>
</section>

<section id="einstellungen" class="tab card">
<h2>⚙️ Einstellungen</h2>

  <label>Firmenlogo</label>
<input id="firmaLogo" type="file" accept="image/*">

<label>Firmenname</label>
<input id="firmaName" placeholder="Fahrrad Werkstatt">

<label>Adresse</label>
<textarea id="firmaAdresse"></textarea>

<label>Telefon</label>
<input id="firmaTelefon">

<label>E-Mail</label>
<input id="firmaEmail">

<label>Steuernummer / UID</label>
<input id="firmaSteuer">

<label>MwSt. %</label>
<input id="firmaMwst" type="number" value="20">

<label>Standard-Stundensatz €</label>
<input id="firmaStundensatz" type="number" value="45">

<button onclick="einstellungenSpeichern()">Einstellungen speichern</button>
</section>

<section id="backup" class="tab card">
<h2>💾 Backup</h2>

<button onclick="backupExport()">Backup exportieren</button>
<textarea id="backupText" placeholder="Backup hier einfügen"></textarea>
<button onclick="backupImport()">Backup importieren</button>
</section>

</div>

<script src="app.js"></script>

</body>
</html>
